<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="AI-Based Tumor Detection Simulation System — Secure login portal for medical professionals.">
    <title>Login — AI Tumor Detection System</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body class="login-body">

    <!-- ── Animated Background Particles ─────────────────── -->
    <div class="particles" id="particles"></div>

    <!-- ── Login Card ────────────────────────────────────── -->
    <div class="login-container">
        <div class="login-card">
            <!-- Branding -->
            <div class="login-brand">
                <div class="brand-icon">
                    <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg">
                        <circle cx="24" cy="24" r="22" stroke="url(#grad1)" stroke-width="3"/>
                        <path d="M24 10v28M10 24h28" stroke="url(#grad1)" stroke-width="3" stroke-linecap="round"/>
                        <circle cx="24" cy="24" r="8" stroke="url(#grad1)" stroke-width="2" opacity="0.6"/>
                        <defs>
                            <linearGradient id="grad1" x1="0" y1="0" x2="48" y2="48">
                                <stop offset="0%" stop-color="#00d4ff"/>
                                <stop offset="100%" stop-color="#7c3aed"/>
                            </linearGradient>
                        </defs>
                    </svg>
                </div>
                <h1>AI Tumor Detection</h1>
                <p class="brand-subtitle">Simulation System</p>
            </div>

            <!-- Error Message -->
            <div class="error-message" id="errorMsg" style="display:none;">
                <svg viewBox="0 0 20 20" fill="currentColor" width="18" height="18">
                    <path fill-rule="evenodd" d="M10 18a8 8 0 100-16 8 8 0 000 16zM8.707 7.293a1 1 0 00-1.414 1.414L8.586 10l-1.293 1.293a1 1 0 101.414 1.414L10 11.414l1.293 1.293a1 1 0 001.414-1.414L11.414 10l1.293-1.293a1 1 0 00-1.414-1.414L10 8.586 8.707 7.293z" clip-rule="evenodd"/>
                </svg>
                <span id="errorText">Invalid credentials. Please try again.</span>
            </div>

            <!-- Login Form -->
            <form action="login" method="POST" id="loginForm" autocomplete="off">
                <div class="form-group">
                    <label for="username">Username</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M10 9a3 3 0 100-6 3 3 0 000 6zm-7 9a7 7 0 1114 0H3z" clip-rule="evenodd"/>
                        </svg>
                        <input type="text" id="username" name="username" placeholder="Enter your username" required>
                    </div>
                </div>

                <div class="form-group">
                    <label for="password">Password</label>
                    <div class="input-wrapper">
                        <svg class="input-icon" viewBox="0 0 20 20" fill="currentColor">
                            <path fill-rule="evenodd" d="M5 9V7a5 5 0 0110 0v2a2 2 0 012 2v5a2 2 0 01-2 2H5a2 2 0 01-2-2v-5a2 2 0 012-2zm8-2v2H7V7a3 3 0 016 0z" clip-rule="evenodd"/>
                        </svg>
                        <input type="password" id="password" name="password" placeholder="Enter your password" required>
                    </div>
                </div>

                <button type="submit" class="btn-login" id="loginBtn">
                    <span class="btn-text">Sign In</span>
                    <span class="btn-loader" style="display:none;">
                        <span class="spinner"></span> Authenticating...
                    </span>
                </button>
            </form>

            <!-- Demo Credentials -->
            <div class="demo-credentials">
                <p><strong>Demo Credentials</strong></p>
                <p><code>admin / admin123</code> &nbsp;or&nbsp; <code>drsmith / smith2024</code></p>
            </div>
        </div>

        <p class="login-footer">&copy; 2026 AI Tumor Detection Simulation System &bull; Academic Project</p>
    </div>

    <script>
        // ── Show error from URL params ──────────────────────
        const params = new URLSearchParams(window.location.search);
        if (params.get('error')) {
            const msg = document.getElementById('errorMsg');
            const txt = document.getElementById('errorText');
            msg.style.display = 'flex';
            if (params.get('error') === 'empty') txt.textContent = 'Please enter both username and password.';
            else if (params.get('error') === 'invalid') txt.textContent = 'Invalid username or password. Please try again.';
            else txt.textContent = 'A server error occurred. Please try later.';
        }

        // ── Loading state ───────────────────────────────────
        document.getElementById('loginForm').addEventListener('submit', function() {
            document.querySelector('.btn-text').style.display = 'none';
            document.querySelector('.btn-loader').style.display = 'inline-flex';
            document.getElementById('loginBtn').disabled = true;
        });

        // ── Particle animation ──────────────────────────────
        (function() {
            const container = document.getElementById('particles');
            for (let i = 0; i < 40; i++) {
                const p = document.createElement('span');
                p.className = 'particle';
                p.style.left = Math.random() * 100 + '%';
                p.style.top  = Math.random() * 100 + '%';
                p.style.animationDelay = (Math.random() * 8) + 's';
                p.style.animationDuration = (6 + Math.random() * 10) + 's';
                p.style.width = p.style.height = (2 + Math.random() * 4) + 'px';
                container.appendChild(p);
            }
        })();
    </script>
</body>
</html>
